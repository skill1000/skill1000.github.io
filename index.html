<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>团队作品提呈总览</title>
    <style>
        /* 全局样式重置与科技风背景 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: radial-gradient(circle at center, #1a1f36 0%, #0a0d1a 100%);
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            overflow-x: hidden;
        }

        /* 页面流光背景装饰 */
        body::before {
            content: '';
            position: absolute;
            top: -10%;
            left: -10%;
            width: 50%;
            height: 50%;
            background: radial-gradient(circle, rgba(0, 242, 254, 0.1) 0%, transparent 70%);
            z-index: 0;
            pointer-events: none;
        }

        /* 头部标题区 */
        header {
            text-align: center;
            margin-bottom: 50px;
            z-index: 1;
        }

        header h1 {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: 2px;
            background: linear-gradient(45deg, #00f2fe, #4facfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        header p {
            color: #718096;
            font-size: 1rem;
            letter-spacing: 1px;
        }

        /* 6板块网格布局 */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
            max-width: 1200px;
            width: 100%;
            z-index: 1;
        }

        /* 个人卡片基础样式（毛玻璃效果） */
        .card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 30px 20px;
            text-align: center;
            text-decoration: none;
            color: inherit;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 卡片悬停特效（核心科技感转换） */
        .card:hover {
            transform: translateY(-8px);
            background: rgba(255, 255, 255, 0.06);
            border-color: #00f2fe;
            box-shadow: 0 10px 30px rgba(0, 242, 254, 0.15);
        }

        /* 悬停时的流光边框线提示 */
        .card::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
            transition: 0.5s;
        }
        .card:hover::after {
            left: 100%;
        }

        /* 头像样式及科技感外圈 */
        .avatar-wrapper {
            position: relative;
            width: 90px;
            height: 90px;
            margin-bottom: 20px;
        }

        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(255, 255, 255, 0.2);
            background: #1e293b;
        }

        /* 头像呼吸灯效果 */
        .card:hover .avatar {
            border-color: #00f2fe;
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.5);
        }

        /* 文字排版 */
        .name {
            font-size: 1.3rem;
            font-weight: 600;
            color: #ffffff;
            margin-bottom: 12px;
            letter-spacing: 1px;
            transition: color 0.3s;
        }

        .card:hover .name {
            color: #00f2fe;
        }

        .info-tag {
            font-size: 0.85rem;
            color: #a0aec0;
            margin: 4px 0;
            font-weight: 300;
        }

        /* 学号采用等宽字体增强数字化风格 */
        .student-id {
            font-family: 'Courier New', Courier, monospace;
            background: rgba(0, 242, 254, 0.1);
            color: #00f2fe;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 0.8rem;
            margin-top: 12px;
            border: 1px solid rgba(0, 242, 254, 0.2);
        }

        /* 响应式适配：平板端 2 列，手机端 1 列 */
        @media (max-width: 900px) {
            .grid-container {
                grid-template-columns: repeat(2, 1fr);
                gap: 20px;
            }
        }

        @media (max-width: 600px) {
            .grid-container {
                grid-template-columns: 1fr;
            }
            header h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
