<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网络安全综合实训作业导航</title>
    <style>
        :root {
            --primary-color: #00adb5;
            --primary-hover: #008c95;
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #e2e8f0;
            --text-muted: #94a3b8;
            --border-color: #334155;
            --grid-item-bg: #141e30;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color); color: var(--text-color); line-height: 1.6; padding-bottom: 40px;
        }
        header {
            background: linear-gradient(135deg, #111827 0%, #1f2937 100%);
            padding: 35px 20px; text-align: center; border-bottom: 1px solid var(--border-color); box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        header h1 { font-size: 26px; color: #ffffff; margin-bottom: 8px; }
        header p { color: var(--text-muted); font-size: 13px; letter-spacing: 0.5px; }
        .container { max-width: 850px; margin: 35px auto; padding: 0 20px; }
        
        .list-card { background-color: var(--card-bg); border: 1px solid var(--border-color); border-radius: 8px; padding: 25px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .list-card h2 { font-size: 18px; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 1px solid var(--border-color); color: #ffffff; display: flex; justify-content: space-between; align-items: center; }
        .counter { font-size: 13px; background-color: #0f172a; padding: 2px 10px; border-radius: 20px; color: var(--primary-color); border: 1px solid var(--border-color); }
        .file-grid { display: grid; grid-template-columns: 1fr; gap: 15px; }
        .file-item { background-color: var(--grid-item-bg); border: 1px solid var(--border-color); border-radius: 6px; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; transition: all 0.2s ease; text-decoration: none; color: inherit; }
        .file-item:hover { transform: translateX(4px); border-color: var(--primary-color); background-color: #1e293b; }
        .file-info { display: flex; align-items: center; gap: 12px; }
        .file-icon { font-size: 24px; color: var(--primary-color); }
        .file-name { font-weight: 600; color: #f8fafc; font-size: 15px; }
        .file-path { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
        .go-link { font-size: 13px; color: var(--primary-color); display: flex; align-items: center; gap: 4px; font-weight: 500; }
    </style>
</head>
<body>

    <header>
        <h1>🌐 网络安全综合实训作业导航</h1>
        <p>归属人：Skill</p>
    </header>

    <div class="container">
        <div class="list-card">
            <h2>
                <span>📂 作业列表</span>
                <span class="counter" id="fileCount">0</span>
            </h2>
            <div class="file-grid" id="fileGrid">
                </div>
        </div>
    </div>

    <script>
        // ==========================================
        // 💡 以后你每增加一个作业，只需要在这里加上文件名即可！
        // ==========================================
        const homeworkFiles = [
            "2-2-4.html",
            "2-2-5.html",
			"2-2-6.html"
        ];

        function renderHomework() {
            const grid = document.getElementById('fileGrid');
            const countEl = document.getElementById('fileCount');
            
            countEl.innerText = homeworkFiles.length;
            grid.innerHTML = '';

            homeworkFiles.forEach(fileName => {
                grid.innerHTML += `
                    <a href="homework/${fileName}" class="file-item">
                        <div class="file-info">
                            <div class="file-icon">🌐</div>
                            <div>
                                <div class="file-name">${fileName}</div>
                                <div class="file-path">相对路径: homework/${fileName}</div>
                            </div>
                        </div>
                        <div class="go-link">立即进入 ➔</div>
                    </a>
                `;
            });
        }

        window.addEventListener('DOMContentLoaded', renderHomework);
    </script>
</body>
</html>
