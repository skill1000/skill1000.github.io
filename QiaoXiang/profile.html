<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生命矩阵档案 | 个人全息画像</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --cyber-bg: #0a0e17;
            --cyber-glow: #00f2fe;
            --cyber-card: rgba(16, 24, 48, 0.75);
            --cyber-text: #e2e8f0;
        }
        body { background-color: var(--cyber-bg); color: var(--cyber-text); }
        .navbar-cyber { background: rgba(10, 14, 23, 0.85); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(0, 242, 254, 0.2); }
        .navbar-brand { font-weight: 800; color: var(--cyber-glow) !important; text-shadow: 0 0 10px rgba(0, 242, 254, 0.5); }
        .nav-link { color: #94a3b8 !important; }
        .nav-link:hover, .nav-link.active { color: var(--cyber-glow) !important; }
        
        .cyber-card {
            background: var(--cyber-card);
            border: 1px solid rgba(0, 242, 254, 0.15);
            border-radius: 12px;
            backdrop-filter: blur(4px);
        }
        .glow-text { color: var(--cyber-glow); text-shadow: 0 0 10px rgba(0, 242, 254, 0.4); }
        .btn-cyber {
            background: transparent; border: 1px solid var(--cyber-glow); color: var(--cyber-glow); transition: 0.3s;
        }
        .btn-cyber:hover { background: var(--cyber-glow); color: #000; box-shadow: 0 0 15px var(--cyber-glow); }
        
        /* 交互动效 */
        .interactive-item {
            padding: 12px; border-radius: 8px; background: rgba(255,255,255,0.03);
            transition: 0.25s; cursor: pointer;
        }
        .interactive-item:hover {
            background: rgba(0, 242, 254, 0.08);
            transform: translateX(5px);
        }
		.text-muted {
			color: #a6b4c9 !important; /* 替换原本暗淡的灰色，提升暗色背景下的可读性 */
		}
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-cyber sticky-top px-3">
        <div class="container">
            <a class="navbar-brand" href="index.html"><i class="fa-solid fa-microchip me-2"></i>QX-GATEWAY v1.0</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li><a class="nav-link" href="index.html">控制台首页</a></li>
                    <li><a class="nav-link active" href="profile.html">生命矩阵档案</a></li>
                    <li><a class="nav-link" href="awards.html">荣誉粒子库</a></li>
                    <li><a class="nav-link" href="contact.html">量子通信港</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <div class="text-center mb-5">
            <h2 class="fw-bold glow-text"><i class="fa-solid fa-id-card-clip me-2"></i>个人全息矩阵档案</h2>
            <p class="text-muted">数字孪生节点身份静态特征与多维拓扑结构映射</p>
        </div>

        <div class="row g-4">
            <div class="col-md-5">
                <div class="cyber-card p-4 h-100">
                    <h5 class="fw-bold glow-text mb-4"><i class="fa-solid fa-atom me-2"></i>静态指纹数据</h5>
                    <div class="d-flex flex-column gap-3">
                        <div class="interactive-item d-flex justify-content-between">
                            <strong><i class="fa-solid fa-signature text-info me-2"></i>真实姓名:</strong>
                            <span>乔翔</span>
                        </div>
                        <div class="interactive-item d-flex justify-content-between">
                            <strong><i class="fa-solid fa-cake-candles text-warning me-2"></i>生理年龄:</strong>
                            <span>18 岁</span>
                        </div>
                        <div class="interactive-item d-flex justify-content-between">
                            <strong><i class="fa-solid fa-flag text-danger me-2"></i>种族血统:</strong>
                            <span>汉族</span>
                        </div>
                        <div class="interactive-item d-flex justify-content-between">
                            <strong><i class="fa-solid fa-school text-primary me-2"></i>主链路节点:</strong>
                            <span>北京信息职业技术学院（东坝校区）</span>
                        </div>
                        <div class="interactive-item">
                            <strong><i class="fa-solid fa-heart-pulse text-pink me-2"></i>兴趣偏好矩阵:</strong>
                            <div class="mt-2 text-muted small">
                                <div>• 核心级：高级程序语言编写、全栈开发重构</div>
                                <div>• 辅助级：电子竞技战略、高并发电脑外设硬件改造</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-md-7">
                <div class="cyber-card p-4 h-100">
                    <h5 class="fw-bold glow-text mb-3"><i class="fa-solid fa-chart-radar me-2"></i>综合研发拓扑网络 (Radar)</h5>
                    <div style="position: relative; height:320px; width:100%;">
                        <canvas id="capabilityChart"></canvas>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="text-start mt-4">
            <a href="index.html" class="btn btn-cyber"><i class="fa-solid fa-angles-left me-2"></i>退出当前节点，回退到主控台</a>
        </div>
    </div>

    <script>
		// 强制等待页面所有 HTML 节点渲染完毕后再绘制图表，防止高宽塌陷
		document.addEventListener("DOMContentLoaded", function() {
			const canvasElement = document.getElementById('capabilityChart');
			if (!canvasElement) return; // 防错保护

			const ctx = canvasElement.getContext('2d');
			
			// 赛博霓虹风格配色配置
			new Chart(ctx, {
				type: 'radar',
				data: {
					labels: ['代码编写 (Coding)', '嵌入式硬件 (IoT)', '游戏策略 (Gaming)', '电脑架构 (PC Setup)', '人机交互 (UI/UX)', '逻辑推演 (Logic)'],
					datasets: [{
						label: '潜能指数值',
						data: [90, 85, 95, 88, 80, 87],
						fill: true,
						backgroundColor: 'rgba(0, 242, 254, 0.2)', // 霓虹蓝半透明充能色
						borderColor: '#00f2fe',                    // 霓虹蓝高亮边框
						pointBackgroundColor: '#00f2fe',
						pointBorderColor: '#fff',
						pointHoverBackgroundColor: '#fff',
						pointHoverBorderColor: '#00f2fe'
					}]
				},
				options: {
					responsive: true,
					maintainAspectRatio: false, // 允许图表充满外部 320px 高度的容器
					scales: {
						r: {
							angleLines: { color: 'rgba(255, 255, 255, 0.15)' }, // 雷达网格散射线
							grid: { color: 'rgba(255, 255, 255, 0.15)' },      // 雷达圈线
							pointLabels: { 
								color: '#a6b4c9',  // 修复暗色重色问题，文字更高亮
								font: { size: 12, family: 'Microsoft YaHei' } 
							},
							ticks: { display: false }, // 隐藏刻度数字数字，保持界面干净
							suggestedMin: 0,
							suggestedMax: 100
						}
					},
					plugins: {
						legend: { 
							labels: { color: '#e2e8f0' } // 顶部标签文字颜色
						}
					}
				}
			});
		});
	</script>
</body>
</html>
