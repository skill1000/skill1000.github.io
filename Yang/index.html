<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>智械 · 粒子组装与交互测试</title>
    <style>
        /* ===== 全局 ===== */
        :root {
            --bg: #05080f;
            --surface: #0a0f1a;
            --border: #1a2540;
            --accent: #4da8da;
            --accent2: #7b5ea7;
            --gold: #c8a87c;
            --text: #c8d0dc;
            --text-dim: #6b7280;
            --glow: rgba(77, 168, 218, 0.25);
            --success: #3ef5a0;
            --warning: #f5c542;
            --danger: #e0556a;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: var(--bg);
            font-family: 'SF Mono', 'Cascadia Code', 'Consolas', 'Menlo', 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', monospace, sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            cursor: crosshair;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        #canvas-container {
            position: fixed;
            inset: 0;
            z-index: 1;
        }
        canvas {
            display: block;
        }

        .scanlines-overlay {
            position: fixed;
            inset: 0;
            z-index: 2;
            pointer-events: none;
            opacity: 0.05;
            background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0, 0, 0, 0.30) 3px, rgba(0, 0, 0, 0.30) 4px);
        }
        .vignette {
            position: fixed;
            inset: 0;
            z-index: 3;
            pointer-events: none;
            background: radial-gradient(ellipse at center, transparent 55%, rgba(5, 8, 15, 0.55) 78%, rgba(5, 8, 15, 0.85) 100%);
        }

        .hud-top {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 10;
            padding: 18px 28px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            pointer-events: none;
            background: linear-gradient(180deg, rgba(5, 8, 15, 0.92) 30%, rgba(5, 8, 15, 0) 100%);
            padding-bottom: 40px;
        }
        .hud-top .title-group {
            display: flex;
            align-items: baseline;
            gap: 14px;
        }
        .hud-top .title-main {
            font-size: 1.25rem;
            font-weight: 600;
            letter-spacing: 0.06em;
            color: #e8edf5;
            text-shadow: 0 0 30px var(--glow);
            position: relative;
        }
        .hud-top .title-main::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 100%;
            height: 1px;
            background: linear-gradient(90deg, var(--accent), transparent 80%);
        }
        .hud-top .title-sub {
            font-size: 0.7rem;
            letter-spacing: 0.08em;
            color: var(--text-dim);
            text-transform: uppercase;
        }
        .hud-top .status-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--success);
            box-shadow: 0 0 10px #3ef5a0aa, 0 0 25px #3ef5a055;
            animation: status-pulse 2.2s ease-in-out infinite;
            display: inline-block;
            margin-right: 8px;
        }
        @keyframes status-pulse {
            0%,
            100% {
                box-shadow: 0 0 8px #3ef5a0aa, 0 0 20px #3ef5a044;
            }
            50% {
                box-shadow: 0 0 18px #3ef5a0dd, 0 0 40px #3ef5a077;
            }
        }
        .hud-top .status-text {
            font-size: 0.65rem;
            letter-spacing: 0.06em;
            color: var(--success);
            pointer-events: auto;
        }

        .control-bar {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
            pointer-events: none;
            max-width: 95vw;
        }
        .control-bar button {
            pointer-events: auto;
            background: rgba(10, 15, 26, 0.80);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px 18px;
            font-family: inherit;
            font-size: 0.7rem;
            letter-spacing: 0.06em;
            color: var(--text);
            cursor: pointer;
            transition: all 0.25s ease;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 72px;
            justify-content: center;
        }
        .control-bar button:hover {
            border-color: var(--accent);
            box-shadow: 0 0 30px rgba(77, 168, 218, 0.15), 0 4px 24px rgba(0, 0, 0, 0.5);
            transform: translateY(-2px);
            background: rgba(20, 30, 50, 0.85);
        }
        .control-bar button:active {
            transform: translateY(0px);
        }
        .control-bar button.primary {
            border-color: var(--accent);
            color: #fff;
            background: rgba(77, 168, 218, 0.20);
        }
        .control-bar button.primary:hover {
            background: rgba(77, 168, 218, 0.30);
            box-shadow: 0 0 40px rgba(77, 168, 218, 0.20);
        }
        .control-bar button.success {
            border-color: var(--success);
            color: var(--success);
            background: rgba(62, 245, 160, 0.12);
        }
        .control-bar button.success:hover {
            background: rgba(62, 245, 160, 0.22);
        }
        .control-bar button:disabled {
            opacity: 0.35;
            pointer-events: none;
            transform: none !important;
        }

        /* ===== 测试面板 - 可交互 ===== */
        .test-panel {
            position: fixed;
            right: 20px;
            top: 80px;
            z-index: 15;
            background: rgba(10, 15, 26, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px 18px;
            min-width: 220px;
            max-width: 270px;
            pointer-events: none;
            transition: all 0.5s cubic-bezier(0.22, 0.61, 0.36, 1);
            opacity: 0;
            transform: translateX(30px);
        }
        .test-panel.visible {
            opacity: 1;
            transform: translateX(0);
            pointer-events: auto;
        }
        .test-panel .test-title {
            font-size: 0.65rem;
            letter-spacing: 0.08em;
            color: var(--text-dim);
            text-transform: uppercase;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .test-panel .test-title .icon {
            font-size: 0.9rem;
        }
        .test-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 5px 6px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            font-size: 0.7rem;
            cursor: pointer;
            border-radius: 4px;
            transition: background 0.15s;
        }
        .test-item:hover {
            background: rgba(77, 168, 218, 0.08);
        }
        .test-item:last-child {
            border-bottom: none;
        }
        .test-item .label {
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .test-item .label .icon-small {
            font-size: 0.7rem;
        }
        .test-item .result {
            font-weight: 500;
            padding: 1px 8px;
            border-radius: 10px;
            font-size: 0.55rem;
            letter-spacing: 0.04em;
            white-space: nowrap;
        }
        .test-item .result.pass {
            color: var(--success);
            background: rgba(62, 245, 160, 0.12);
            border: 1px solid rgba(62, 245, 160, 0.20);
        }
        .test-item .result.fail {
            color: var(--danger);
            background: rgba(224, 85, 106, 0.12);
            border: 1px solid rgba(224, 85, 106, 0.20);
        }
        .test-item .result.pending {
            color: var(--gold);
            background: rgba(200, 168, 124, 0.10);
            border: 1px solid rgba(200, 168, 124, 0.15);
            animation: pulse-gold 1.6s ease-in-out infinite;
        }
        .test-item .result.running {
            color: var(--accent);
            background: rgba(77, 168, 218, 0.12);
            border: 1px solid rgba(77, 168, 218, 0.20);
            animation: pulse-blue 0.8s ease-in-out infinite alternate;
        }
        @keyframes pulse-blue {
            0% {
                opacity: 0.6;
            }
            100% {
                opacity: 1;
            }
        }
        @keyframes pulse-gold {
            0%,
            100% {
                opacity: 0.6;
            }
            50% {
                opacity: 1;
            }
        }
        .test-item .progress-dot {
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--text-dim);
            margin-left: 4px;
            transition: background 0.3s;
        }
        .test-item .progress-dot.active {
            background: var(--accent);
            box-shadow: 0 0 8px var(--accent);
        }

        /* 状态图 */
        #statusDiagram {
            width: 100%;
            height: 80px;
            margin-top: 6px;
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.30);
            border: 1px solid rgba(255, 255, 255, 0.06);
            display: block;
        }
        .diagram-label {
            font-size: 0.5rem;
            color: var(--text-dim);
            text-align: center;
            margin-top: 2px;
        }

        .assemble-progress {
            position: fixed;
            bottom: 82px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 12;
            background: rgba(10, 15, 26, 0.70);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 6px 18px;
            font-size: 0.6rem;
            color: var(--text-dim);
            display: flex;
            align-items: center;
            gap: 12px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.5s ease;
        }
        .assemble-progress.visible {
            opacity: 1;
        }
        .assemble-progress .step-dots {
            display: flex;
            gap: 6px;
        }
        .assemble-progress .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.06);
            transition: all 0.4s ease;
        }
        .assemble-progress .dot.done {
            background: var(--success);
            border-color: var(--success);
            box-shadow: 0 0 12px rgba(62, 245, 160, 0.30);
        }
        .assemble-progress .dot.active {
            background: var(--accent);
            border-color: var(--accent);
            box-shadow: 0 0 16px rgba(77, 168, 218, 0.40);
            animation: dot-pulse 0.8s ease-in-out infinite alternate;
        }
        @keyframes dot-pulse {
            0% {
                transform: scale(0.8);
                opacity: 0.6;
            }
            100% {
                transform: scale(1.2);
                opacity: 1;
            }
        }
        .assemble-progress .label {
            color: var(--text);
            font-weight: 500;
        }

        .hint-bar {
            position: fixed;
            left: 24px;
            bottom: 82px;
            z-index: 10;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .hint-item {
            font-size: 0.55rem;
            letter-spacing: 0.04em;
            color: var(--text-dim);
            opacity: 0.6;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .hint-key {
            display: inline-block;
            padding: 2px 7px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 4px;
            font-size: 0.5rem;
            color: #aaa;
            background: rgba(255, 255, 255, 0.03);
            min-width: 14px;
            text-align: center;
        }

        @media (max-width: 768px) {
            .hud-top {
                padding: 10px 14px;
                padding-bottom: 24px;
            }
            .hud-top .title-main {
                font-size: 0.95rem;
            }
            .hud-top .title-sub {
                font-size: 0.5rem;
            }
            .control-bar {
                bottom: 14px;
                gap: 6px;
            }
            .control-bar button {
                padding: 6px 12px;
                font-size: 0.6rem;
                min-width: 56px;
            }
            .test-panel {
                right: 8px;
                top: 70px;
                padding: 12px 14px;
                min-width: 180px;
                max-width: 210px;
            }
            .hint-bar {
                display: none;
            }
            .assemble-progress {
                bottom: 70px;
                padding: 4px 12px;
                font-size: 0.5rem;
                gap: 8px;
            }
            .assemble-progress .dot {
                width: 6px;
                height: 6px;
            }
            #statusDiagram {
                height: 60px;
            }
        }
        @media (max-width: 480px) {
            .control-bar button {
                padding: 4px 8px;
                font-size: 0.5rem;
                min-width: 44px;
                border-radius: 6px;
            }
            .test-panel {
                min-width: 150px;
                padding: 10px 10px;
            }
            .test-item {
                font-size: 0.6rem;
            }
        }
    </style>
</head>
<body>

    <div class="scanlines-overlay"></div>
    <div class="vignette"></div>

    <div class="hud-top">
        <div class="title-group">
            <span class="title-main">粒子智械 · 交互测试</span>
            <span class="title-sub">Interactive Test Lab</span>
        </div>
        <div>
            <span class="status-dot"></span>
            <span class="status-text" id="status-label">系统就绪</span>
        </div>
    </div>

    <div id="canvas-container"></div>

    <div class="assemble-progress" id="assembleProgress">
        <span class="label" id="progressLabel">组装进度</span>
        <div class="step-dots" id="stepDots"></div>
        <span id="progressCount">0/6</span>
    </div>

    <!-- 测试面板 - 可交互测试项 -->
    <div class="test-panel" id="testPanel">
        <div class="test-title">
            <span><span class="icon">🧪</span> 系统测试</span>
            <span style="font-size:0.5rem;color:var(--text-dim);">点击项目运行</span>
        </div>
        <div class="test-item" data-test-id="joint">
            <span class="label"><span class="icon-small">🔄</span> 关节灵活性</span>
            <span class="result pending" id="test-joint">等待</span>
        </div>
        <div class="test-item" data-test-id="balance">
            <span class="label"><span class="icon-small">⚖️</span> 动态平衡</span>
            <span class="result pending" id="test-balance">等待</span>
        </div>
        <div class="test-item" data-test-id="perception">
            <span class="label"><span class="icon-small">👁️</span> 感知响应</span>
            <span class="result pending" id="test-perception">等待</span>
        </div>
        <div class="test-item" data-test-id="communication">
            <span class="label"><span class="icon-small">📡</span> 通信延迟</span>
            <span class="result pending" id="test-communication">等待</span>
        </div>
        <div class="test-item" data-test-id="energy">
            <span class="label"><span class="icon-small">🔋</span> 能耗效率</span>
            <span class="result pending" id="test-energy">等待</span>
        </div>
        <div class="test-item" data-test-id="environment">
            <span class="label"><span class="icon-small">🌐</span> 环境感知</span>
            <span class="result pending" id="test-environment">等待</span>
        </div>
        <div style="margin-top:6px;border-top:1px solid rgba(255,255,255,0.06);padding-top:6px;display:flex;justify-content:space-between;align-items:center;">
            <span style="font-size:0.6rem;color:var(--text-dim);">总体状态</span>
            <span class="result pending" id="testOverall" style="font-size:0.6rem;">未测试</span>
        </div>
        <canvas id="statusDiagram" width="220" height="80"></canvas>
        <div class="diagram-label" id="diagramLabel">点击测试项目查看状态</div>
    </div>

    <div class="control-bar" id="controlBar">
        <button class="primary" id="btnAssemble">🔧 一键组装</button>
        <button class="success" id="btnRunAll" disabled>▶ 全部测试</button>
        <button id="btnReset">⟲ 重置</button>
    </div>

    <div class="hint-bar">
        <div class="hint-item"><span class="hint-key">🖱 拖拽</span> 旋转场景</div>
        <div class="hint-item"><span class="hint-key">🖱 滚轮</span> 缩放视野</div>
        <div class="hint-item"><span class="hint-key">R</span> 重置视角</div>
        <div class="hint-item"><span class="hint-key">空格</span> 脉冲（组装后）</div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // ============================================================
        //  DOM 引用
        // ============================================================
        const container = document.getElementById('canvas-container');
        const statusLabel = document.getElementById('status-label');
        const btnAssemble = document.getElementById('btnAssemble');
        const btnRunAll = document.getElementById('btnRunAll');
        const btnReset = document.getElementById('btnReset');
        const testPanel = document.getElementById('testPanel');
        const assembleProgress = document.getElementById('assembleProgress');
        const stepDots = document.getElementById('stepDots');
        const progressCount = document.getElementById('progressCount');
        const progressLabel = document.getElementById('progressLabel');
        const testOverall = document.getElementById('testOverall');
        const diagramCanvas = document.getElementById('statusDiagram');
        const diagramLabel = document.getElementById('diagramLabel');
        const ctx = diagramCanvas.getContext('2d');

        // ============================================================
        //  性能
        // ============================================================
        const isMobile = /Android|iPhone|iPad|iPod|webOS/i.test(navigator.userAgent) || window.innerWidth < 768;
        const pixelRatio = Math.min(window.devicePixelRatio, isMobile ? 1.0 : 1.4);
        const PARTICLE_MULT = isMobile ? 0.45 : 0.70;

        // ============================================================
        //  场景 / 相机 / 渲染器
        // ============================================================
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2('#05080f', 0.00030);

        const camera = new THREE.PerspectiveCamera(50, container.clientWidth / container.clientHeight, 0.3, 28);
        camera.position.set(0, 1.4, 6.0);
        camera.lookAt(0, 0.7, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: !isMobile, alpha: true, powerPreference: 'high-performance' });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.setPixelRatio(pixelRatio);
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.0;
        renderer.outputColorSpace = THREE.SRGBColorSpace;
        container.appendChild(renderer.domElement);

        // ============================================================
        //  光照
        // ============================================================
        const ambientLight = new THREE.AmbientLight('#1a2a40', 1.8);
        scene.add(ambientLight);
        const pointLight1 = new THREE.PointLight('#4da8da', 28, 9, 1.8);
        pointLight1.position.set(2, 3, 3);
        scene.add(pointLight1);
        const pointLight2 = new THREE.PointLight('#7b5ea7', 16, 7, 1.8);
        pointLight2.position.set(-2, 1.5, -2);
        scene.add(pointLight2);

        // ============================================================
        //  场景分组
        // ============================================================
        const mainGroup = new THREE.Group();
        const starGroup = new THREE.Group();
        scene.add(mainGroup);
        scene.add(starGroup);

        // ============================================================
        //  星空
        // ============================================================
        const starCount = Math.floor(350 * PARTICLE_MULT);
        const starGeo = new THREE.BufferGeometry();
        const starPos = new Float32Array(starCount * 3);
        const starCol = new Float32Array(starCount * 3);
        for (let i = 0; i < starCount; i++) {
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            const r = 7 + Math.random() * 9;
            starPos[i * 3] = r * Math.sin(phi) * Math.cos(theta);
            starPos[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
            starPos[i * 3 + 2] = r * Math.cos(phi);
            const t = Math.random();
            starCol[i * 3] = 0.55 + t * 0.35;
            starCol[i * 3 + 1] = 0.6 + t * 0.3;
            starCol[i * 3 + 2] = 0.75 + t * 0.25;
        }
        starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
        starGeo.setAttribute('color', new THREE.BufferAttribute(starCol, 3));
        const starMat = new THREE.PointsMaterial({
            size: 0.035,
            vertexColors: true,
            blending: THREE.AdditiveBlending,
            depthWrite: false,
            transparent: true,
            opacity: 0.7,
            sizeAttenuation: true,
        });
        const starPoints = new THREE.Points(starGeo, starMat);
        starGroup.add(starPoints);

        // ============================================================
        //  机器人粒子系统（主体）
        // ============================================================
        const robotParticleCount = Math.floor(580 * PARTICLE_MULT);
        const robotGeo = new THREE.BufferGeometry();
        const robotPosBase = new Float32Array(robotParticleCount * 3);
        const robotPos = new Float32Array(robotParticleCount * 3);
        const robotCol = new Float32Array(robotParticleCount * 3);
        const robotSizes = new Float32Array(robotParticleCount);

        function sampleSphere(cx, cy, cz, radius, count, out, idx) {
            for (let i = 0; i < count; i++) {
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);
                const r = radius * (0.85 + Math.random() * 0.15);
                out[idx + i * 3] = cx + r * Math.sin(phi) * Math.cos(theta);
                out[idx + i * 3 + 1] = cy + r * Math.sin(phi) * Math.sin(theta);
                out[idx + i * 3 + 2] = cz + r * Math.cos(phi);
            }
        }

        function sampleCapsule(cx1, cy1, cz1, cx2, cy2, cz2, radius, count, out, idx) {
            for (let i = 0; i < count; i++) {
                const t = Math.random();
                const cx = cx1 + (cx2 - cx1) * t;
                const cy = cy1 + (cy2 - cy1) * t;
                const cz = cz1 + (cz2 - cz1) * t;
                const angle = Math.random() * Math.PI * 2;
                const r = radius * (0.80 + Math.random() * 0.20);
                out[idx + i * 3] = cx + r * Math.cos(angle);
                out[idx + i * 3 + 1] = cy + r * Math.sin(angle);
                out[idx + i * 3 + 2] = cz + (Math.random() - 0.5) * r * 1.2;

        function sampleBox(cx, cy, cz, hw, hh, hd, count, out, idx) {
            const faces = [
                { axis: 'x', val: hw, r: [cy - hh, cy + hh, cz - hd, cz + hd] },
                { axis: 'x', val: -hw, r: [cy - hh, cy + hh, cz - hd, cz + hd] },
                { axis: 'y', val: hh, r: [cx - hw, cx + hw, cz - hd, cz + hd] },
                { axis: 'y', val: -hh, r: [cx - hw, cx + hw, cz - hd, cz + hd] },
                { axis: 'z', val: hd, r: [cx - hw, cx + hw, cy - hh, cy + hh] },
                { axis: 'z', val: -hd, r: [cx - hw, cx + hw, cy - hh, cy + hh] },
            ];
            for (let i = 0; i < count; i++) {
                const f = faces[Math.floor(Math.random() * 6)];
                const u = f.r[0] + Math.random() * (f.r[1] - f.r[0]);
                const v = f.r[2] + Math.random() * (f.r[3] - f.r[2]);
                if (f.axis === 'x') { out[idx + i * 3] = cx + f.val;
                    out[idx + i * 3 + 1] = u;
                    out[idx + i * 3 + 2] = v; } else if (f.axis === 'y') { out[idx + i * 3] = u;
                    out[idx + i * 3 + 1] = cy + f.val;
                    out[idx + i * 3 + 2] = v; } else { out[idx + i * 3] = u;
                    out[idx + i * 3 + 1] = v;
                    out[idx + i * 3 + 2] = cz + f.val; }
            }

            const total = partConfigs.length;

                const dot = document.createElement('span');
                dot.className = 'dot';
                if (i < done) dot.classList.add('done');
                else if (i === done && done < total) dot.classList.add('active');
                stepDots.appendChild(dot);
            }
            progressCount.textContent = `${done}/${total}`;
            if (done === total) {
                progressLabel.textContent = '✅ 组装完成';

        function assemblePart(partMesh, instant = false) {
            if (partMesh.userData.assembled) return;
            if (partMesh.userData.isAnimating) return;
            const targetPos = partMesh.userData.target;
            const startPos = partMesh.position.clone();
            if (instant) {
                partMesh.position.copy(targetPos);
                partMesh.userData.assembled = true;
                assembledParts.add(partMesh.userData.id);
                const colAttr = partMesh.geometry.getAttribute('color');
                const colArray = colAttr.array;
                for (let i = 0; i < colArray.length; i++) { colArray[i] = Math.min(1, colArray[i] * 1.6); }
                colAttr.needsUpdate = true;
                updateProgressUI();
                return;
            }
            partMesh.userData.isAnimating = true;
            partMesh.userData.animProgress = 0;
            partMesh.userData.startAnimPos.copy(startPos);
            partMesh.userData.animTargetPos = targetPos.clone();
            isAssembling = true;
        }

            if (isAssembling || isAssembled) return;

                setTimeout(() => {

            testDefinitions.forEach(t => {
                testState[t.id] = { status: 'pending', result: null }; // pending, running, pass, fail
                const el = document.getElementById(`test-${t.id}`);
                if (el) {
                    el.textContent = '等待';
                    el.className = 'result pending';
                }
            });
            testOverall.textContent = '未测试';
            testOverall.className = 'result pending';
            currentActiveTest = null;
            testRunning = false;
            ctx.clearRect(0, 0, diagramCanvas.width, diagramCanvas.height);
            diagramLabel.textContent = '点击测试项目查看状态';
        }

        // 初始化测试状态
        resetAllTests();

        // 绘制状态图函数（根据测试id和进度）
        function drawStatusDiagram(testId, progress) {
            const w = diagramCanvas.width,
                h = diagramCanvas.height;
            ctx.clearRect(0, 0, w, h);
            ctx.fillStyle = 'rgba(0,0,0,0.2)';
            ctx.roundRect(0, 0, w, h, 8);
            ctx.fill();

            const cx = w / 2,
                cy = h / 2;

            if (testId === 'joint') {
                // 关节：旋转臂
                const angle = progress * Math.PI * 2;
                ctx.save();
                ctx.translate(cx, cy);
                ctx.strokeStyle = '#4da8da';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(0, 0, 20, 0, angle);
                ctx.stroke();
                ctx.beginPath();
                ctx.arc(0, 0, 14, 0, Math.PI * 2);
                ctx.stroke();
                ctx.fillStyle = '#4da8da';
                ctx.beginPath();
                ctx.arc(20 * Math.cos(angle), 20 * Math.sin(angle), 5, 0, 2 * Math.PI);
                ctx.fill();
                ctx.restore();
                ctx.fillStyle = '#aac';
                ctx.font = '10px sans-serif';
                ctx.fillText('关节转动', 10, 20);
            } else if (testId === 'balance') {
                // 水平仪
                const tilt = (progress - 0.5) * 0.3;
                ctx.save();
                ctx.translate(cx, cy);
                ctx.strokeStyle = '#f5c542';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(0, 0, 20, 0, Math.PI * 2);
                ctx.stroke();
                ctx.fillStyle = '#f5c542';
                ctx.fillRect(-15, -2 + tilt * 10, 30, 4);
                ctx.restore();
                ctx.fillStyle = '#aac';
                ctx.font = '10px sans-serif';
                ctx.fillText('平衡状态', 10, 20);
            } else if (testId === 'perception') {
                // 雷达扫描
                const sweep = progress * Math.PI * 2;
                ctx.save();
                ctx.translate(cx, cy);
                ctx.strokeStyle = '#3ef5a0';
                ctx.lineWidth = 1.5;
                for (let i = 0; i < 3; i++) {
                    ctx.beginPath();
                    ctx.arc(0, 0, 10 + i * 7, 0, Math.PI * 2);
                    ctx.stroke();
                }
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.lineTo(22 * Math.cos(sweep), 22 * Math.sin(sweep));
                ctx.stroke();
                ctx.fillStyle = '#3ef5a0';
                ctx.beginPath();
                ctx.arc(22 * Math.cos(sweep), 22 * Math.sin(sweep), 4, 0, 2 * Math.PI);
                ctx.fill();
                ctx.restore();
                ctx.fillStyle = '#aac';
                ctx.font = '10px sans-serif';
                ctx.fillText('感知扫描', 10, 20);
            } else if (testId === 'communication') {
                // 通信波形
                ctx.save();
                ctx.translate(cx, cy);
                ctx.strokeStyle = '#ffaa44';
                ctx.lineWidth = 2;
                ctx.beginPath();
                for (let x = -30; x <= 30; x++) {
                    const val = Math.sin(x * 0.5 + progress * 4) * 10 * (1 + 0.3 * Math.sin(x * 0.2 + progress * 2));
                    if (x === -30) ctx.moveTo(x, val);
                    else ctx.lineTo(x, val);
                }
                ctx.stroke();
                ctx.restore();
                ctx.fillStyle = '#aac';
                ctx.font = '10px sans-serif';
                ctx.fillText('通信波形', 10, 20);
            } else if (testId === 'energy') {
                // 电池电量
                const level = progress;
                ctx.save();
                ctx.translate(cx - 20, cy - 10);
                ctx.strokeStyle = '#88dd88';
                ctx.lineWidth = 2;
                ctx.strokeRect(0, 0, 40, 20);
                ctx.fillStyle = '#88dd88';
                ctx.fillRect(2, 2, 36 * level, 16);
                ctx.fillStyle = '#aac';
                ctx.font = '8px sans-serif';
                ctx.fillText(`${Math.round(level*100)}%`, 12, 13);
                ctx.restore();
                ctx.fillStyle = '#aac';
                ctx.font = '10px sans-serif';
                ctx.fillText('能耗效率', 10, 20);
            } else if (testId === 'environment') {
                // 环境点阵
                const cols = 5,
                    rows = 4;
                const spacing = 10;
                const offsetX = cx - (cols - 1) * spacing / 2;
                const offsetY = cy - (rows - 1) * spacing / 2;
                for (let r = 0; r < rows; r++) {
                    for (let c = 0; c < cols; c++) {
                        const val = Math.sin(c * 1.2 + r * 0.8 + progress * 3) * 0.5 + 0.5;
                        const size = 3 + val * 4;
                        ctx.fillStyle = `rgba(100,200,255,${0.3+val*0.6})`;
                        ctx.beginPath();
                        ctx.arc(offsetX + c * spacing, offsetY + r * spacing, size / 2, 0, 2 * Math.PI);
                        ctx.fill();
                    }
                }
                ctx.fillStyle = '#aac';
                ctx.font = '10px sans-serif';
                ctx.fillText('环境感知', 10, 20);
            } else {
                // 空闲
                ctx.fillStyle = '#667';
                ctx.font = '12px sans-serif';
                ctx.fillText('待测试', cx - 20, cy + 4);
            }
        }

        // 运行单个测试
        function runSingleTest(testId) {
            if (testRunning) {
                // 如果正在运行，忽略或重置？我们选择重置并开始新测试
                // 停止当前测试（清空计时器）
                if (window.currentTestInterval) {
                    clearInterval(window.currentTestInterval);
                    window.currentTestInterval = null;
                }
                // 将当前运行项置为等待
                if (currentActiveTest) {
                    const prev = testState[currentActiveTest];
                    if (prev.status === 'running') {
                        prev.status = 'pending';
                        prev.result = null;
                        const el = document.getElementById(`test-${currentActiveTest}`);
                        if (el) { el.textContent = '等待';
                            el.className = 'result pending'; }
                    }
                }
                testRunning = false;
                currentActiveTest = null;
            }

            // 检查组装是否完成
            if (!isAssembled) {
                statusLabel.textContent = '⚠️ 请先完成组装';
                setTimeout(() => {
                    if (isAssembled) statusLabel.textContent = '✅ 组装完成，可进行测试';
                    else statusLabel.textContent = '系统就绪';
                }, 1200);
                return;
            }

            const testDef = testDefinitions.find(t => t.id === testId);
            if (!testDef) return;

            // 重置该项状态
            testState[testId] = { status: 'running', result: null };
            const el = document.getElementById(`test-${testId}`);
            if (el) {
                el.textContent = '运行中';
                el.className = 'result running';
            }
            currentActiveTest = testId;
            testRunning = true;
            diagramLabel.textContent = `测试: ${testDef.label}`;

            // 进度
            let progress = 0;
            const duration = testDef.duration;
            const startTime = Date.now();

            // 清除旧interval
            if (window.currentTestInterval) {
                clearInterval(window.currentTestInterval);
                window.currentTestInterval = null;
            }

            window.currentTestInterval = setInterval(() => {
                const elapsed = Date.now() - startTime;
                progress = Math.min(1, elapsed / duration);
                drawStatusDiagram(testId, progress);

                if (progress >= 1) {
                    clearInterval(window.currentTestInterval);
                    window.currentTestInterval = null;
                    // 判定结果（模拟，90%通过率）
                    const pass = Math.random() < 0.90;
                    testState[testId].status = pass ? 'pass' : 'fail';
                    testState[testId].result = pass;
                    if (el) {
                        el.textContent = pass ? '✅ 通过' : '⚠️ 需校准';
                        el.className = `result ${pass ? 'pass' : 'fail'}`;
                    }
                    testRunning = false;
                    currentActiveTest = null;
                    // 更新总体状态
                    updateOverallStatus();
                    // 如果全部通过，触发脉冲
                    if (pass) {
                        flashUI(0.5);
                    }
                    diagramLabel.textContent = '测试完成';
                    // 延迟重置图示
                    setTimeout(() => {
                        if (!testRunning) {
                            drawStatusDiagram(testId, 1);
                            diagramLabel.textContent = '点击测试项目查看状态';
                        }
                    }, 1500);
                }
            }, 30);
        }

        // 更新总体状态
        function updateOverallStatus() {
            const allTests = testDefinitions.map(t => testState[t.id]);
            const total = allTests.length;
            const passed = allTests.filter(t => t.status === 'pass').length;
            const failed = allTests.filter(t => t.status === 'fail').length;
            const pending = allTests.filter(t => t.status === 'pending').length;
            if (pending === total) {
                testOverall.textContent = '未测试';
                testOverall.className = 'result pending';
            } else if (failed === 0 && pending === 0) {
                testOverall.textContent = `✅ 全部通过 (${passed}/${total})`;
                testOverall.className = 'result pass';
                // 全部通过触发大脉冲
                if (passed === total) {
                    setTimeout(() => triggerRobotPulse(), 300);
                }
            } else if (failed > 0) {
                testOverall.textContent = `⚠️ ${failed}项需校准`;
                testOverall.className = 'result fail';
            } else {
                testOverall.textContent = `⏳ ${passed}/${total} 通过`;
                testOverall.className = 'result pending';
            }
        }

        // 运行全部测试（顺序执行）
        function runAllTests() {
            if (testRunning) return;
            if (!isAssembled) {
                statusLabel.textContent = '⚠️ 请先完成组装';
                return;
            }
            // 重置所有测试状态
            resetAllTests();
            // 获取所有测试id
            const ids = testDefinitions.map(t => t.id);
            let idx = 0;

            function runNext() {
                if (idx >= ids.length) {
                    statusLabel.textContent = '✅ 全部测试完成';
                    return;
                }
                const id = ids[idx];
                // 运行单项，但需要等待它结束
                // 由于runSingleTest是异步的，我们用setTimeout轮询检查状态
                runSingleTest(id);
                // 等待该测试结束
                const checkInterval = setInterval(() => {
                    if (!testRunning) {
                        clearInterval(checkInterval);
                        idx++;
                        setTimeout(runNext, 300);
                    }
                }, 100);
            }
            runNext();
            statusLabel.textContent = '▶ 运行全部测试...';
        }

        // ============================================================
        //  脉冲特效
        // ============================================================
        let robotPulseActive = false;
        let robotPulseStartTime = 0;
        let audioCtx = null;

        function triggerRobotPulse() {
            robotPulseActive = true;
            robotPulseStartTime = performance.now() * 0.001;
            try {
                if (!audioCtx) audioCtx = new(window.AudioContext || window.webkitAudioContext)();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.5);
                gain.gain.setValueAtTime(0.10, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.55);
                osc.start(audioCtx.currentTime);
                osc.stop(audioCtx.currentTime + 0.55);
            } catch (e) {}
            flashUI(1.6);
            statusLabel.textContent = '⚡ 脉冲激活';
            setTimeout(() => {
                if (!isTesting && isAssembled) statusLabel.textContent = '✅ 组装完成，可进行测试';
                else if (!isAssembled) statusLabel.textContent = '系统就绪';
            }, 1500);
        }

        function playClickSound() {
            try {
                if (!audioCtx) audioCtx = new(window.AudioContext || window.webkitAudioContext)();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.type = 'sine';
                osc.frequency.setValueAtTime(700 + Math.random() * 400, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(180, audioCtx.currentTime + 0.15);
                gain.gain.setValueAtTime(0.06, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.18);
                osc.start(audioCtx.currentTime);
                osc.stop(audioCtx.currentTime + 0.18);
            } catch (e) {}
        }

        // ============================================================
        //  交互控制（点击测试项）
        // ============================================================
        document.querySelectorAll('.test-item').forEach(item => {
            item.addEventListener('click', (e) => {
                const testId = item.dataset.testId;
                if (testId) {
                    runSingleTest(testId);
                    playClickSound();
                }
            });
        });

        // ============================================================
        //  3D交互（拖拽等）
        // ============================================================
        const raycaster = new THREE.Raycaster();
        const mouseNDC = new THREE.Vector2();
        let isDragging = false;
        let dragPrevX = 0,
            dragPrevY = 0;
        let targetRotX = 0,
            targetRotY = 0;
        let mainGroupRotX = 0,
            mainGroupRotY = 0;
        let cameraDistance = 6.0;
        let targetCameraDistance = 6.0;
        const MIN_DIST = 2.8;
        const MAX_DIST = 10;

        function getPointerPos(e) {
            const cx = e.touches ? e.touches[0].clientX : e.clientX;
            const cy = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: cx, y: cy };
        }

        function getIntersection(clientX, clientY) {
            mouseNDC.x = (clientX / window.innerWidth) * 2 - 1;
            mouseNDC.y = -(clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouseNDC, camera);
            const targets = [];
            parts.forEach(p => {
                if (!p.userData.assembled && !p.userData.isAnimating) {
                    const hit = p.children.find(c => c.isMesh && c.material.transparent && c.material.opacity === 0);
                    if (hit) targets.push(hit);
                }
            });
            const intersects = raycaster.intersectObjects(targets);
            if (intersects.length > 0) {
                let parent = intersects[0].object.parent;
                while (parent && !parts.includes(parent)) { parent = parent.parent; }
                if (parent && parts.includes(parent)) return parent;
            }
            return null;
        }

        window.addEventListener('mousemove', (e) => {
            const { x, y } = getPointerPos(e);
            if (isDragging) {
                const dx = x - dragPrevX;
                const dy = y - dragPrevY;
                targetRotY += dx * 0.005;
                targetRotX += dy * 0.005;
                targetRotX = Math.max(-1.1, Math.min(1.1, targetRotX));
                dragPrevX = x;
                dragPrevY = y;
            }
        });

        window.addEventListener('mousedown', (e) => {
            if (e.target.tagName === 'BUTTON' || e.target.closest('.control-bar') || e.target.closest('.test-item'))
            return;
            if (e.button === 0) {
                const hit = getIntersection(e.clientX, e.clientY);
                if (hit && !isAssembling && !isTesting) {
                    assemblePart(hit);
                    playClickSound();
                    return;
                }
                isDragging = true;
                const { x, y } = getPointerPos(e);
                dragPrevX = x;
                dragPrevY = y;
            }
        });

        window.addEventListener('mouseup', (e) => {
            if (isDragging) {
                const dx = Math.abs((getPointerPos(e).x || dragPrevX) - dragPrevX);
                const dy = Math.abs((getPointerPos(e).y || dragPrevY) - dragPrevY);
                if (dx < 4 && dy < 4) {}
                isDragging = false;
            }
        });

        window.addEventListener('wheel', (e) => {
            e.preventDefault();
            targetCameraDistance += e.deltaY * 0.008;
            targetCameraDistance = Math.max(MIN_DIST, Math.min(MAX_DIST, targetCameraDistance));
        }, { passive: false });

        window.addEventListener('keydown', (e) => {
            switch (e.key.toLowerCase()) {
                case 'r':
                    targetRotX = 0;
                    targetRotY = 0;
                    targetCameraDistance = 6.0;
                    statusLabel.textContent = '视角已重置';
                    setTimeout(() => {
                        if (isAssembled) statusLabel.textContent = '✅ 组装完成';
                        else statusLabel.textContent = '系统就绪';
                    }, 1200);
                    break;
                case ' ':
                    e.preventDefault();
                    if (isAssembled) {
                        triggerRobotPulse();
                    } else {
                        statusLabel.textContent = '⚠️ 请先完成组装';
                        setTimeout(() => {
                            if (isAssembled) statusLabel.textContent = '✅ 组装完成';
                            else statusLabel.textContent = '系统就绪';
                        }, 1200);
                    }
                    break;
            }
        });

        // Touch events
        window.addEventListener('touchstart', (e) => {
            if (e.target.tagName === 'BUTTON' || e.target.closest('.control-bar') || e.target.closest('.test-item'))
            return;
            if (e.touches.length === 1) {
                const hit = getIntersection(e.touches[0].clientX, e.touches[0].clientY);
                if (hit && !isAssembling && !isTesting) {
                    assemblePart(hit);
                    playClickSound();
                    return;
                }
                isDragging = true;
                dragPrevX = e.touches[0].clientX;
                dragPrevY = e.touches[0].clientY;
            }
        }, { passive: false });

        window.addEventListener('touchmove', (e) => {
            if (isDragging && e.touches.length === 1) {
                const dx = e.touches[0].clientX - dragPrevX;
                const dy = e.touches[0].clientY - dragPrevY;
                targetRotY += dx * 0.005;
                targetRotX += dy * 0.005;
                targetRotX = Math.max(-1.1, Math.min(1.1, targetRotX));
                dragPrevX = e.touches[0].clientX;
                dragPrevY = e.touches[0].clientY;
            }
        }, { passive: false });

        window.addEventListener('touchend', (e) => {
            if (isDragging) {
                const dist = Math.abs((e.changedTouches[0]?.clientX || dragPrevX) - dragPrevX) +
                    Math.abs((e.changedTouches[0]?.clientY || dragPrevY) - dragPrevY);
                if (dist < 8) {}
                isDragging = false;
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        });

        // ============================================================
        //  UI 闪烁
        // ============================================================
        function flashUI(intensity = 1) {
            const btns = document.querySelectorAll('.control-bar button, .test-item');
            btns.forEach(btn => {
                btn.style.boxShadow = `0 0 ${20*intensity}px rgba(77,168,218,${0.15*intensity})`;
                btn.style.borderColor = `rgba(77,168,218,${0.4*intensity})`;
                setTimeout(() => {
                    btn.style.boxShadow = '';
                    btn.style.borderColor = '';
                }, 400);
            });
        }

        // ============================================================
        //  按钮绑定
        // ============================================================
        btnAssemble.addEventListener('click', assembleAll);
        btnRunAll.addEventListener('click', runAllTests);
        btnReset.addEventListener('click', resetAssembly);

        // ============================================================
        //  动画主循环
        // ============================================================
        const clock = new THREE.Clock();

        function animate(timestamp) {
            requestAnimationFrame(animate);

            const dt = Math.min(clock.getDelta(), 0.08);
            const time = timestamp * 0.001;

            // 平滑旋转
            mainGroupRotX += (targetRotX - mainGroupRotX) * 0.08;
            mainGroupRotY += (targetRotY - mainGroupRotY) * 0.08;
            mainGroup.rotation.x = mainGroupRotX;
            mainGroup.rotation.y = mainGroupRotY;

            cameraDistance += (targetCameraDistance - cameraDistance) * 0.10;
            camera.position.set(0, 1.4, cameraDistance);
            camera.lookAt(0, 0.7, 0);

            starGroup.rotation.y += dt * 0.035;
            starGroup.rotation.x += dt * 0.012;

            // 呼吸
            const breathCycle = time * 1.5;
            const breathAmp = 0.022;
            const posAttr = robotGeo.getAttribute('position');
            const arr = posAttr.array;
            for (let i = 0; i < robotParticleCount; i++) {
                const bx = robotPosBase[i * 3];
                const by = robotPosBase[i * 3 + 1];
                const bz = robotPosBase[i * 3 + 2];
                const dist = Math.sqrt(bx * bx + (by - 0.7) * (by - 0.7) + bz * bz) + 0.001;
                const nx = bx / dist;
                const ny = (by - 0.7) / dist;
                const nz = bz / dist;
                const wave = Math.sin(breathCycle + i * 0.035) * breathAmp;
                let pulseExtra = 0;
                if (robotPulseActive) {
                    const elapsed = time - robotPulseStartTime;
                    if (elapsed < 0.6) {
                        const decay = Math.exp(-elapsed * 5);
                        pulseExtra = Math.sin(elapsed * 18 + i * 0.12) * 0.055 * decay;
                    } else if (elapsed > 0.6 && elapsed < 1.5) {
                        robotPulseActive = false;
                    }
                }
                arr[i * 3] = bx + nx * (wave + pulseExtra);
                arr[i * 3 + 1] = by + ny * (wave + pulseExtra);
                arr[i * 3 + 2] = bz + nz * (wave + pulseExtra);
            }
            posAttr.needsUpdate = true;

            // 轨道环
            orbitalRings.forEach(ring => {
                ring.rotation.y += dt * ring.userData.speed;
            });

            // 环境物体
            envObjects.forEach(obj => {
                const ud = obj.userData;
                const offset = Math.sin(time * ud.floatSpeed + ud.floatOffset) * ud.floatAmp;
                obj.position.y = ud.basePos[1] + offset;
                obj.rotation.y += dt * ud.rotSpeed;
                obj.rotation.x += dt * ud.rotSpeed * 0.3;
            });

            // 数据流
            const dfArr = dfGeo.getAttribute('position').array;
            for (let i = 0; i < dataFlowCount; i++) {
                const meta = dfMeta[i];
                meta.t += dt * meta.speed * (meta.forward ? 1 : -1);
                if (meta.t > 1) { meta.t = 1;
                    meta.forward = false; }
                if (meta.t < 0) { meta.t = 0;
                    meta.forward = true; }
                const pos = new THREE.Vector3().lerpVectors(meta.src, meta.dst, meta.t);
                dfArr[i * 3] = pos.x;
                dfArr[i * 3 + 1] = pos.y;
                dfArr[i * 3 + 2] = pos.z;
            }
            dfGeo.getAttribute('position').needsUpdate = true;

            // 部件动画
            parts.forEach(p => {
                if (!p.visible) return;
                if (!p.userData.assembled && !p.userData.isAnimating) {
                    const phase = p.userData.floatPhase;
                    const amp = p.userData.floatAmp;
                    const speed = p.userData.floatSpeed;
                    p.position.y += Math.sin(time * speed + phase) * amp * dt * 1.2;
                    p.position.x += Math.cos(time * speed * 0.7 + phase * 0.5) * amp * 0.5 * dt * 1.2;
                    p.position.z += Math.sin(time * speed * 0.8 + phase * 0.7) * amp * 0.5 * dt * 1.2;
                    p.rotation.x += dt * 0.15;
                    p.rotation.y += dt * 0.25;
                    p.rotation.z += dt * 0.10;
                }
                if (p.userData.isAnimating) {
                    const prog = p.userData.animProgress + dt * 1.6;
                    p.userData.animProgress = Math.min(1, prog);
                    const t = p.userData.animProgress;
                    const c1 = 1.70158;
                    const c3 = c1 + 1;
                    const val = 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2);
                    const start = p.userData.startAnimPos;
                    const target = p.userData.animTargetPos || p.userData.target;
                    p.position.lerpVectors(start, target, val);
                    p.rotation.x *= 0.92;
                    p.rotation.y *= 0.92;
                    p.rotation.z *= 0.92;
                    const colAttr = p.geometry.getAttribute('color');
                    const colArray = colAttr.array;
                    const brightFactor = 1 + t * 0.8;
                    const color = new THREE.Color(p.userData.color);
                    for (let i = 0; i < colArray.length; i += 3) {
                        const base = 0.6 + (i / colArray.length) * 0.4;
                        colArray[i] = Math.min(1, color.r * base * brightFactor);
                        colArray[i + 1] = Math.min(1, color.g * base * brightFactor);
                        colArray[i + 2] = Math.min(1, color.b * base * brightFactor);
                    }
                    colAttr.needsUpdate = true;
                    if (t >= 1) {
                        p.position.copy(target);
                        p.userData.isAnimating = false;
                        p.userData.assembled = true;
                        const colAttr2 = p.geometry.getAttribute('color');
                        const colArray2 = colAttr2.array;
                        const color2 = new THREE.Color(p.userData.color);
                        for (let i = 0; i < colArray2.length; i += 3) {
                            const base = 0.6 + (i / colArray2.length) * 0.4;
                            colArray2[i] = Math.min(1, color2.r * base * 1.8);
                            colArray2[i + 1] = Math.min(1, color2.g * base * 1.8);
                            colArray2[i + 2] = Math.min(1, color2.b * base * 1.8);
                        }
                        colAttr2.needsUpdate = true;
                        assembledParts.add(p.userData.id);
                        playClickSound();
                        updateProgressUI();
                        if (assembledParts.size === partConfigs.length) {
                            isAssembling = false;
                            statusLabel.textContent = '✅ 组装完成！';
                            flashUI(1.8);
                            setTimeout(() => {
                                triggerRobotPulse();
                            }, 400);
                        }
                    }
                }
            });

            pointLight1.intensity = 28 + Math.sin(time * 1.2) * 3;
            pointLight2.intensity = 16 + Math.cos(time * 1.5) * 3;

            renderer.render(scene, camera);
        }

        // ============================================================
        //  启动
        // ============================================================
        updateProgressUI();
        setTimeout(() => {
            parts.forEach(p => { p.visible = true; });
            assembleProgress.classList.add('visible');
            statusLabel.textContent = '🔄 点击粒子部件组装 或 一键组装';
            setTimeout(() => {
                if (!isAssembled) {
                    statusLabel.textContent = '点击彩色粒子云进行组装';
                }
            }, 2000);
        }, 800);

        // 初始绘制空闲图
        drawStatusDiagram(null, 0);

        requestAnimationFrame(animate);

        console.log(`
        ╔═══════════════════════════════════════════╗
        ║  粒子智械 · 交互测试 v5.0               ║
        ║  测试项目: 6项可点击，独立运行          ║
        ║  状态图: 6种不同视觉反馈                ║
        ║                                         ║
        ║  🧩 点击粒子部件组装                    ║
        ║  🧪 点击测试项目运行单项测试            ║
        ║  ▶ 全部测试 → 顺序执行所有项目         ║
        ║                                         ║
        ║  🖱 拖拽旋转 · 滚轮缩放 · R重置视角    ║
        ║  空格 → 脉冲（组装后）                 ║
        ╚═══════════════════════════════════════════╝
        `);
    </script>
